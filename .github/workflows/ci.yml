name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22.17.0
          cache: pnpm

      # uv（astral 官方 action）
      - uses: astral-sh/setup-uv@v3

      # 装依赖（含 dev: pytest/ruff/fakeredis/respx/aiosqlite）
      - run: uv sync --dev

      # 安装 Defuddle / Eta，供 Node 桥接集成测试使用
      - run: pnpm install --frozen-lockfile

      # lint
      - run: uv run ruff check src/inboxserver tests scripts

      # 测试（跳过 e2e，需真实凭据 + chromium）
      - run: uv run pytest tests/unit tests/integration -m "not e2e" --tb=short

      # 类型检查（mypy 硬门槛建：P2-10 修通 pyproject 配置 + 16 类型错误，去 || true）
      - run: uv run mypy src/inboxserver
