name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv（astral 官方 action）
      - uses: astral-sh/setup-uv@v3

      # 装依赖（含 dev: pytest/ruff/fakeredis/respx/aiosqlite）
      - run: uv sync --dev

      # lint
      - run: uv run ruff check src/inboxserver tests scripts

      # 测试（跳过 e2e，需真实凭据 + chromium）
      - run: uv run pytest tests/unit tests/integration -m "not e2e" --tb=short

      # 类型检查（mypy）
      - run: uv run mypy src/inboxserver --ignore-missing-imports || true
