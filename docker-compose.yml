services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
      POSTGRES_DB: inbox
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7
    volumes: [redisdata:/data]

  server:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    ports: ["8000:8000"]
    volumes: ["./channels.yaml:/app/channels.yaml:ro"]
    # 启动前 alembic 建表/迁移，再起 uvicorn（生产 schema 由 alembic 管，lifespan create_all 兜底）
    command: ["sh", "-c", "uv run alembic upgrade head && uv run uvicorn inboxserver.main:app --host 0.0.0.0 --port 8000"]

  worker:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    volumes: ["./channels.yaml:/app/channels.yaml:ro"]
    # worker 跑 headed chromium，需 Xvfb 虚拟 X display
    # 不用 xvfb-run 作 PID1 包装：实测 xvfb-run 的 sh 作为容器 PID1 时，其 python 子进程不持久
    # （手动 docker exec 同命令能跑，PID1 却不行——PID1 进程组/信号差异吞掉子进程）
    # 改为手动后台起 Xvfb + exec python：runner 直接成为 PID1，信号直达，graceful shutdown 正常
    command: ["sh", "-c", "Xvfb :99 -screen 0 1280x1024x24 -nolisten tcp & export DISPLAY=:99 && exec /app/.venv/bin/python -m inboxserver.workers.runner"]
    healthcheck:
      # 进程级检查：runner 进程不在即 unhealthy（runner 作 PID1 崩即容器停 + restart 自动拉起）
      test: ["CMD-SHELL", "pgrep -f 'inboxserver.workers.runner' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
  redisdata:
